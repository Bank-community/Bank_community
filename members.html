<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#001540">
    <title>Trust Community Fund Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        /* === ROYAL THEME VARIABLES === */
        :root {
            --primary-color: #002366;   /* Royal Blue */
            --primary-darker: #001233;
            --accent-gold: #D4AF37;     /* Royal Gold */
            --gold-gradient: linear-gradient(135deg, #FFD700, #D4AF37);
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --blue-color: #1565c0;
            --shadow-gold: 0 8px 25px rgba(212, 175, 55, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding-top: 400px; /* Space for fixed Profile Section */
            transition: padding-top 0.3s ease;
        }

        /* === HEADER (With Hidden Download Trigger) === */
        .header {
            background: linear-gradient(160deg, var(--primary-color) 0%, var(--primary-darker) 100%);
            color: white;
            padding: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 1001;
            height: 70px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-bottom: 3px solid var(--accent-gold);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        /* The Hidden Download Button */
        .header img {
            width: 45px; height: 45px;
            margin-right: 12px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            cursor: pointer; /* Indicates Clickable */
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .header img:active {
            transform: scale(0.90);
            box-shadow: 0 0 15px var(--accent-gold);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em; margin: 0;
            font-weight: 700; letter-spacing: 0.5px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* === LOADING SPINNER === */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--primary-darker);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 4000; color: var(--accent-gold); transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.2);
            border-left-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader.hidden { opacity: 0; pointer-events: none; }

        /* === PIN PROMPT === */
        #passwordPromptContainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 3000; transition: opacity 0.3s ease;
        }
        #passwordPromptContainer.hidden { opacity: 0; pointer-events: none; }
        
        #passwordPromptMessage {
            padding: 30px;
            background: linear-gradient(145deg, #ffffff, #f0f4ff);
            border-radius: 16px;
            text-align: center;
            max-width: 320px; width: 85%;
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        #passwordInput {
            width: 80%; padding: 12px; margin: 20px 0;
            border: 2px solid #ccc; border-radius: 50px;
            font-size: 20px; text-align: center; letter-spacing: 8px; outline: none;
        }
        #passwordInput:focus { border-color: var(--primary-color); }
        #passwordSubmit {
            padding: 12px 30px; font-weight: bold;
            background: var(--primary-color); color: white;
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* === PROFILE SECTION (HERO CARD) === */
        .profile-section {
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 20px;
            box-shadow: var(--shadow-gold);
            width: 94%; max-width: 800px;
            z-index: 1000; padding: 20px;
            display: grid;
            grid-template-areas: "pic header" "stats stats";
            grid-template-columns: auto 1fr; 
            gap: 15px; align-items: center;
            transition: top 0.3s ease;
        }

        .profile-picture {
            grid-area: pic; width: 80px; height: 80px;
            border-radius: 50%; padding: 3px;
            background: var(--gold-gradient);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .profile-picture img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 2px solid white; cursor: pointer; }

        .profile-header-area { 
            grid-area: header; display: flex; flex-direction: column; justify-content: center; padding-right: 80px;
        }
        .profile-header-area h3 {
            margin: 0; font-size: 1.4em; color: var(--primary-color);
            font-family: 'Playfair Display', serif; font-weight: 700;
        }

        /* Buttons Area */
        .profile-buttons-area { position: absolute; top: 20px; right: 20px; }
        #sipStatusButton {
            background: linear-gradient(to bottom, #002366, #001233);
            color: var(--accent-gold); border: 1px solid var(--accent-gold); 
            padding: 6px 12px; border-radius: 8px; font-size: 0.8em; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 5px;
        }

        .profile-stats-grid {
            grid-area: stats; display: grid;
            grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin-top: 5px;
        }
        .metric-card {
            background: #fff; border: 1px solid #e0e0e0;
            padding: 10px 5px; border-radius: 12px;
            text-align: center; display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        #netBalanceCard { border-color: var(--primary-color); background: #f0f4ff; }
        #loanDueCard { border-color: var(--danger-color); background: #fff5f5; }
        
        .metric-card .label { font-size: 0.75em; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .metric-card .value { font-weight: 800; font-size: 1.1em; color: var(--primary-color); }
        #netBalanceCard .value { color: var(--blue-color); }
        #loanDueCard .value { color: var(--danger-color); }
        #totalSipValue { color: var(--success-color); }

        /* === FILTERS === */
        .filters {
            display: flex; gap: 10px; margin: 15px auto; max-width: 800px; padding: 0 10px;
        }
        .filter-item { flex: 1; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; font-weight: 700; color: #555; margin-left: 5px; }
        select {
            width: 100%; padding: 12px 15px; font-size: 14px; border: 1px solid #ccc;
            border-radius: 50px; background-color: white; outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* === RESPONSIVE TABLE (THE MAIN UPDATE) === */
        .table-wrapper {
            width: 100%;
            overflow-x: auto; /* Enable Horizontal Scroll */
            -webkit-overflow-scrolling: touch;
            padding-bottom: 5px; /* Space for scrollbar */
        }

        .table-container { 
            width: 95%; max-width: 800px; margin: 0 auto 30px auto; 
            background: white; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden; /* Round corners */
        }

        table { 
            width: 100%; border-collapse: collapse; 
            min-width: 600px; /* Forces scroll on small screens */
        }

        thead {
            background-color: var(--primary-color);
            color: white;
        }

        th {
            padding: 15px 12px;
            text-align: left;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap; /* Prevent headers breaking */
            position: sticky; top: 0; z-index: 10;
        }
        /* Specific Alignments */
        th.text-right, td.text-right { text-align: right; }
        th.text-center, td.text-center { text-align: center; }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
            color: #333;
            white-space: nowrap; /* Prevent data breaking */
        }

        /* Zebra Striping for readability */
        tbody tr:nth-child(even) { background-color: #f8f9fa; }
        tbody tr:hover { background-color: #f0f4ff; }

        /* Color Coding */
        .val-credit { color: var(--success-color); font-weight: 600; }
        .val-debit { color: var(--danger-color); font-weight: 600; }
        .val-balance { color: var(--primary-color); font-weight: 700; }
        
        tfoot { background-color: #f0f4ff; border-top: 2px solid var(--accent-gold); }
        tfoot td { font-weight: bold; color: var(--primary-color); padding: 15px; }

        /* Scrollbar Styling for Table */
        .table-wrapper::-webkit-scrollbar { height: 6px; }
        .table-wrapper::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 4px; }
        .table-wrapper::-webkit-scrollbar-track { background-color: #f1f1f1; }

        /* === MODALS === */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; 
            z-index: 2500; opacity: 1; transition: opacity 0.3s ease; 
        }
        .modal.hidden { opacity: 0; pointer-events: none; }
        
        .modal-content { 
            background: white; padding: 25px; border-radius: 16px; 
            max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto; 
            border-top: 5px solid var(--accent-gold); position: relative;
        }
        .modal-close { 
            position: absolute; top: 10px; right: 15px; 
            background: #eee; border: none; font-size: 20px; 
            cursor: pointer; width: 30px; height: 30px; border-radius: 50%;
        }
        
        /* Status List inside Modal */
        .status-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f5f5f5; }
        .status-paid { color: var(--success-color); background: #e8f5e9; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .status-pending { color: var(--danger-color); background: #ffebee; padding: 2px 8px; border-radius: 4px; font-weight: bold; }

        #modalImage { width: 100%; border-radius: 8px; border: 2px solid var(--accent-gold); }

        /* Mobile Adjustment for Header */
        @media only screen and (max-width: 768px) {
            body { padding-top: 420px; }
            .profile-section { top: 90px; padding: 15px; }
            .profile-stats-grid { gap: 8px; }
            .metric-card { padding: 8px 4px; }
            .metric-card .value { font-size: 0.95em; }
        }
    </style>
</head>
<body>

    <div id="loader"> <div class="spinner"></div> Loading Dashboard... </div>

    <div id="passwordPromptContainer" class="hidden">
        <div id="passwordPromptMessage">
            <p><i data-feather="lock"></i> Enter Access PIN</p>
            <input type="password" id="passwordInput" inputmode="numeric" pattern="[0-9]*" maxlength="10" autocomplete="off" placeholder="••••">
            <div id="passwordError"></div>
            <button id="passwordSubmit">UNLOCK</button>
        </div>
    </div>

    <div id="dashboardContent" class="hidden">
        
        <div class="header">
            <img src="https://ik.imagekit.io/kdtvm0r78/IMG-20251202-WA0000.jpg" alt="Download Report" id="downloadPdfBtn" title="Download Statement">
            <h1>Trust Community Fund</h1>
        </div>

        <div id="profileSection" class="profile-section">
            <div class="profile-picture" id="profilePictureContainer"></div>
            
            <div class="profile-header-area">
                 <h3 id="profileName">Loading...</h3>
                 <small style="color: #666; font-size: 0.8em; margin-top: 2px;">Member Dashboard</small>
            </div>
            
            <div class="profile-buttons-area">
                <button id="sipStatusButton"><i data-feather="check-circle" style="width: 14px;"></i> SIP Status</button>
            </div>
            
            <div class="profile-stats-grid">
                 <div class="metric-card">
                     <span class="label">Total SIP</span>
                     <span id="totalSipValue" class="value">₹0</span>
                 </div>
                 <div class="metric-card">
                     <span class="label">Total Loan</span>
                     <span id="totalLoanValue" class="value">₹0</span>
                 </div>
                 <div class="metric-card" id="netBalanceCard">
                     <span class="label">Net Balance</span>
                     <span id="netBalanceValue" class="value">₹0</span>
                 </div>
                 <div class="metric-card" id="loanDueCard">
                     <span class="label">Loan Due</span>
                     <span id="loanDueValue" class="value">₹0</span>
                 </div>
                 <div class="metric-card">
                     <span class="label">Int. Paid</span>
                     <span id="interestPaidValue" class="value">₹0</span>
                 </div>
                 <div class="metric-card">
                     <span class="label">Joined</span>
                     <span id="joiningDateValue" class="value">-</span>
                 </div>
            </div>
        </div>

        <div class="filters">
             <div class="filter-item">
                <label for="memberFilter">Select Member:</label>
                <select id="memberFilter">
                    <option value="all">All Members</option>
                </select>
            </div>
             <div class="filter-item">
                <label for="typeFilter">Filter Data:</label>
                <select id="typeFilter">
                    <option value="all">All Transactions</option>
                    <option value="active_loans">Active Loans</option>
                    <option value="loan">Loan History</option>
                    <option value="payment">Payment History</option>
                    <option value="sip">SIP History</option>
             </select>
            </div>
        </div>
        
        <div class="table-container">
            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th class="text-right">Debit (₹)</th>
                            <th class="text-right">Principal (₹)</th>
                            <th class="text-right">Interest (₹)</th>
                            <th class="text-right">Balance (₹)</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                    <tfoot>
                        </tfoot>
                </table>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal hidden">
        <div class="modal-content" style="background:transparent; border:none; box-shadow:none; padding:0;">
            <button class="modal-close" onclick="document.getElementById('imageModal').classList.add('hidden')">×</button>
            <img id="modalImage" src="" alt="Profile Image Fullscreen">
        </div>
    </div>
    
    <div id="sipStatusModal" class="modal hidden">
         <div class="modal-content">
             <button class="modal-close" onclick="document.getElementById('sipStatusModal').classList.add('hidden')">×</button>
             <h2 style="text-align:center; color:var(--primary-color);">Current Month SIP</h2>
             <div id="sipStatusList" class="status-list">Loading...</div>
         </div>
     </div>

    <script src="members.js"></script>

</body>
</html>
