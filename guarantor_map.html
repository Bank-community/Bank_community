<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCF Royal Network Map</title>
    
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        
        #network-container {
            width: 100vw;
            height: 100vh;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Loading Overlay */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* Stats Card */
        .stats-card {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            min-width: 200px;
        }
    </style>
</head>
<body>

    <div class="stats-card">
        <h3 class="text-xs font-bold text-[#002366] uppercase tracking-widest mb-3 border-b pb-2">Network Stats</h3>
        <div class="text-[12px] space-y-2 text-gray-700">
            <div class="flex justify-between"><span>Total Members:</span> <span id="stat-total" class="font-bold text-[#002366]">0</span></div>
            <div class="flex justify-between"><span>Prime Nodes:</span> <span class="font-bold text-[#D4AF37]">3</span></div>
            <div class="flex justify-between"><span>Orphans:</span> <span id="stat-orphans" class="text-red-500 font-bold">0</span></div>
        </div>
        <div class="mt-3 pt-2 border-t border-gray-200 grid grid-cols-2 gap-2 text-[10px]">
            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-[#D4AF37]"></span> Root</div>
            <div class="flex items-center gap-1"><span class="w-2 h-2 rounded-full border border-[#002366] bg-white"></span> Member</div>
        </div>
    </div>

    <div class="absolute top-5 right-5 z-10 flex flex-col gap-3">
        <button onclick="fitGraph()" class="bg-white p-3 rounded-full shadow-lg text-[#002366] hover:bg-blue-50 transition border border-gray-200"><i data-feather="maximize"></i></button>
        <button onclick="location.reload()" class="bg-white p-3 rounded-full shadow-lg text-[#D4AF37] hover:bg-yellow-50 transition border border-gray-200"><i data-feather="refresh-cw"></i></button>
    </div>

    <div id="network-container"></div>

    <div id="loader">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-[#D4AF37] rounded-full animate-spin"></div>
        <p class="mt-4 text-xs font-bold text-[#002366] tracking-widest">GENERATING NETWORK...</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Names must match exactly or roughly (we will normalize them)
        const PRIME_MEMBERS = ["Prince Rama", "Amit kumar", "Mithilesh Sahni"];
        const ROOT_ID = "TCF_ROOT";
        const DEFAULT_IMG = "https://i.ibb.co/HTNrbJxD/20250716-222246.png"; // Placeholder image

        let network = null;

        window.onload = async () => {
            feather.replace();
            try {
                // Firebase Config Fetch
                const res = await fetch('/api/firebase-config');
                const config = await res.json();
                if(!firebase.apps.length) firebase.initializeApp(config);
                
                const db = firebase.database();
                const snap = await db.ref('members').once('value');
                
                if(snap.exists()) {
                    buildGraph(snap.val());
                } else {
                    alert("No data found.");
                    document.getElementById('loader').style.display = 'none';
                }

            } catch(e) { 
                console.error(e);
                alert("Error loading data. Check console.");
                document.getElementById('loader').style.display = 'none';
            }
        };

        function buildGraph(membersObj) {
            const nodes = [];
            const edges = [];
            const nameToIdMap = new Map();
            let orphanCount = 0;

            // 1. Setup Root Node
            nodes.push({
                id: ROOT_ID,
                label: "TCF ROOT",
                shape: "box",
                color: { background: "#D4AF37", border: "#B8860B" },
                font: { color: "white", size: 20, face: "Segoe UI", bold: true },
                margin: 15,
                shadow: true
            });

            // 2. Pre-process Members (Create ID Map)
            Object.entries(membersObj).forEach(([id, m]) => {
                if (m.status === 'Approved' && m.fullName) {
                    // Store normalized name for matching
                    nameToIdMap.set(m.fullName.trim().toLowerCase(), id);
                }
            });

            // 3. Create Nodes & Edges
            Object.entries(membersObj).forEach(([id, m]) => {
                if (m.status !== 'Approved' || !m.fullName) return;

                const cleanName = m.fullName.trim().toLowerCase();
                const isPrime = PRIME_MEMBERS.some(p => p.toLowerCase() === cleanName);
                const imageUrl = m.profilePicUrl || DEFAULT_IMG;

                // Node Design
                nodes.push({
                    id: id,
                    label: m.fullName.split(" ")[0], // Only First Name
                    title: `<b>${m.fullName}</b><br>Guarantor: ${m.guarantorName || 'None'}`, // Tooltip
                    shape: "circularImage",
                    image: imageUrl,
                    size: isPrime ? 35 : 25,
                    borderWidth: isPrime ? 4 : 2,
                    color: { 
                        border: isPrime ? "#D4AF37" : "#002366", 
                        background: "#ffffff" 
                    },
                    font: { size: 12, color: "#333", face: "Segoe UI" }
                    // NO 'level' property here! Let Vis.js calculate it.
                });

                // Edge Logic (Connections)
                let parentId = null;
                let edgeColor = "#cbd5e1"; // Default light gray
                let edgeDashes = false;

                if (isPrime) {
                    // Rule 1: Prime Members connect to ROOT
                    parentId = ROOT_ID;
                    edgeColor = "#D4AF37"; // Gold for Prime connection
                } else if (m.guarantorName) {
                    // Rule 2: Normal Members connect to Guarantor
                    const gName = m.guarantorName.trim().toLowerCase();
                    if (nameToIdMap.has(gName)) {
                        parentId = nameToIdMap.get(gName);
                        edgeColor = "#002366"; // Royal Blue for valid connection
                    } else {
                        // Guarantor Name exists but not found in DB -> Orphan -> Connect to Root
                        parentId = ROOT_ID;
                        edgeDashes = true; // Dashed line for broken link
                        orphanCount++;
                    }
                } else {
                    // Rule 3: No Guarantor Name -> Connect to Root
                    parentId = ROOT_ID;
                    edgeDashes = true;
                    orphanCount++;
                }

                if (parentId) {
                    edges.push({
                        from: parentId,
                        to: id,
                        color: { color: edgeColor },
                        dashes: edgeDashes,
                        width: isPrime ? 3 : 1
                    });
                }
            });

            updateUI(nodes.length - 1, orphanCount); // -1 for Root
            renderVis(nodes, edges);
        }

        function renderVis(nodes, edges) {
            const container = document.getElementById('network-container');
            const data = { nodes: nodes, edges: edges };
            
            const options = {
                layout: {
                    hierarchical: {
                        direction: "UD",       // Up-Down
                        sortMethod: "directed", // Automatic hierarchy
                        nodeSpacing: 100,      // Horizontal space
                        levelSeparation: 150,  // Vertical space
                        shakeTowards: 'roots'  // Tighter layout
                    }
                },
                nodes: {
                    borderWidthSelected: 4,
                },
                edges: {
                    smooth: {
                        type: "cubicBezier",
                        forceDirection: "vertical",
                        roundness: 0.4
                    },
                    arrows: { to: { enabled: true, scaleFactor: 0.5 } }
                },
                physics: false, // Static layout is better for hierarchy
                interaction: {
                    dragNodes: true,
                    zoomView: true,
                    hover: true
                }
            };

            network = new vis.Network(container, data, options);
            
            // Wait for render then hide loader
            network.on("afterDrawing", function() {
                document.getElementById('loader').style.display = 'none';
            });
            
            // Auto fit
            setTimeout(() => network.fit(), 500);
        }

        function updateUI(total, orphans) {
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-orphans').innerText = orphans;
        }

        function fitGraph() {
            if(network) network.fit({ animation: true });
        }
    </script>
</body>
</html>
