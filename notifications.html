<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#001540">
    <title>Transactions - Trust Community Fund</title>
    
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- CSS DESIGN --- */
        :root {
            --primary: #001540;
            --gold: #D4AF37;
            --bg: #f8f9fd;
            --green: #2e7d32;
            --red: #c62828;
            --blue: #1565c0;
            --text-dark: #1a1a1a;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 80px;
            color: var(--text-dark);
        }

        /* HEADER SECTION */
        .header-section {
            background-color: var(--primary);
            color: white;
            padding: 20px 20px 45px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title { font-size: 1.4rem; font-weight: 600; margin: 0; }
        .sub-title { font-size: 0.75rem; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; display: block; }
        
        /* PDF Download Icon */
        .header-logo-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            overflow: hidden;
            cursor: pointer;
            background: white;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-logo-btn:active { transform: scale(0.9); }
        .header-logo-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* MONTH NAVIGATOR */
        .month-nav-container {
            position: absolute;
            bottom: -22px;
            left: 0; 
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .month-selector {
            background: white;
            padding: 8px 10px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 220px;
            justify-content: space-between;
        }

        .nav-btn {
            background: #f0f2f5;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn:active { background: var(--gold); color: white; }

        .current-month {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* STATS CARDS */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 45px 15px 10px 15px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 12px 5px;
            text-align: center;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .stat-card.active {
            border-color: var(--gold);
            background: #fffdf5;
            transform: translateY(-2px);
        }

        .stat-icon-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 1rem;
        }

        .stat-label { font-size: 0.65rem; font-weight: 600; color: #999; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 0.85rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; }

        /* Colors */
        .card-sip .stat-icon-circle { background: #e8f5e9; color: var(--green); }
        .card-sip .stat-value { color: var(--green); }
        .card-loan .stat-icon-circle { background: #ffebee; color: var(--red); }
        .card-loan .stat-value { color: var(--red); }
        .card-repay .stat-icon-circle { background: #e3f2fd; color: var(--blue); }
        .card-repay .stat-value { color: var(--blue); }

        /* LIST HEADER */
        .list-header {
            padding: 15px 20px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .list-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tx-count-badge {
            background: var(--primary);
            color: var(--gold);
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .filter-indicator {
            display: block;
            font-size: 0.7rem;
            color: var(--gold);
            text-align: center;
            margin-top: -5px;
            margin-bottom: 5px;
            font-weight: 500;
            height: 15px; 
        }

        /* TX LIST */
        .tx-list { padding: 5px 15px; }

        .tx-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }
        .tx-card:active { transform: scale(0.98); }

        .tx-date-box {
            background: #f5f7fa;
            border-radius: 12px;
            padding: 8px 10px;
            text-align: center;
            min-width: 50px;
            margin-right: 15px;
        }
        .tx-month { font-size: 0.65rem; font-weight: 700; color: var(--red); text-transform: uppercase; display: block; line-height: 1; }
        .tx-day { font-size: 1.2rem; font-weight: 700; color: var(--primary); display: block; line-height: 1.2; }

        .tx-info { flex-grow: 1; }
        .tx-name { font-size: 0.95rem; font-weight: 600; color: var(--primary); margin: 0; }
        .tx-type { font-size: 0.7rem; font-weight: 600; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
        .tx-amount { font-size: 1rem; font-weight: 700; text-align: right; }

        .color-green { color: var(--green); }
        .color-red { color: var(--red); }
        .color-blue { color: var(--blue); }
        .empty-state { text-align: center; padding: 40px; color: #999; font-size: 0.9rem; }

        /* BOTTOM NAV */
        .bottom-nav-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: white; display: flex; justify-content: space-around;
            align-items: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
        }
        .nav-item { text-align: center; color: #ccc; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { width: 22px; height: 22px; margin-bottom: 2px; }
        .nav-text { font-size: 0.65rem; font-weight: 600; display: block; }
        .nav-center-btn {
            background: var(--primary); width: 50px; height: 50px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--gold); margin-top: -25px; border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,35,102,0.3);
        }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="header-top">
            <div>
                <h1 class="page-title">Transaction History</h1>
                <span class="sub-title">Trust Community Fund</span>
            </div>
            <div class="header-logo-btn" onclick="generatePDF()">
                <img src="https://ik.imagekit.io/kdtvm0r78/1000123791_3ZT7JNENn.jpg" alt="Download PDF">
            </div>
        </div>
        
        <div class="month-nav-container">
            <div class="month-selector">
                <button class="nav-btn" onclick="changeMonth(-1)"><i data-feather="chevron-left"></i></button>
                <span id="currentMonthDisplay" class="current-month">LOADING...</span>
                <button class="nav-btn" onclick="changeMonth(1)"><i data-feather="chevron-right"></i></button>
            </div>
        </div>
    </header>

    <div class="stats-container">
        <div class="stat-card card-sip" onclick="toggleFilter('SIP', this)">
            <div class="stat-icon-circle"><i data-feather="arrow-down-left" style="width:18px;"></i></div>
            <div class="stat-label">SIP (IN)</div>
            <div class="stat-value" id="val-sip">₹0</div>
        </div>

        <div class="stat-card card-loan" onclick="toggleFilter('LOAN', this)">
            <div class="stat-icon-circle"><i data-feather="arrow-up-right" style="width:18px;"></i></div>
            <div class="stat-label">LOAN GIVEN</div>
            <div class="stat-value" id="val-loan">₹0</div>
        </div>

        <div class="stat-card card-repay" onclick="toggleFilter('REPAY', this)">
            <div class="stat-icon-circle"><i data-feather="check-circle" style="width:18px;"></i></div>
            <div class="stat-label">REPAYMENT</div>
            <div class="stat-value" id="val-repay">₹0</div>
        </div>
    </div>

    <div id="filterStatus" class="filter-indicator"></div>

    <div class="list-header">
        <span class="list-title">Transaction Log</span>
        <span id="txCountBadge" class="tx-count-badge">0 Transactions</span>
    </div>

    <div id="transactionList" class="tx-list">
        <div class="empty-state">Loading transactions...</div>
    </div>

    <nav class="bottom-nav-container">
        <div class="nav-item" onclick="window.location.href='index.html'">
            <i data-feather="home" class="nav-icon"></i>
            <span class="nav-text">Home</span>
        </div>
        <div class="nav-item" onclick="window.location.href='loan_dashbord.html'">
            <i data-feather="briefcase" class="nav-icon"></i>
            <span class="nav-text">Loan</span>
        </div>
        <div class="nav-item" onclick="window.location.href='loan_form.html'">
            <div class="nav-center-btn">
                <i data-feather="file-text" style="width: 20px; height: 20px;"></i>
                <span style="font-size: 8px; font-weight: bold;">APPLY</span>
            </div>
        </div>
        <div class="nav-item active" onclick="window.location.href='notifications.html'">
            <i data-feather="clock" class="nav-icon"></i>
            <span class="nav-text">History</span>
        </div>
        <div class="nav-item" onclick="window.location.href='index.html?tab=tab-profile'">
            <i data-feather="user" class="nav-icon"></i>
            <span class="nav-text">Profile</span>
        </div>
    </nav>

    <script>
        const CACHE_KEY = 'tcf_royal_cache_v6';
        const LOGO_URL = "https://ik.imagekit.io/kdtvm0r78/1000123791_3ZT7JNENn.jpg";
        
        let allTransactions = [];
        let membersData = {};
        let globalData = {}; // Full data store for Global Stats
        let currentMonthTransactions = []; 
        
        let currentDate = new Date();
        let activeFilter = null;

        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            feather.replace();
        });

        // 1. DATA LOADING
        async function initFirebase() {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                const data = JSON.parse(cached);
                globalData = data;
                processData(data);
            }

            try {
                const res = await fetch('/api/firebase-config');
                const config = await res.json();
                if (!firebase.apps.length) firebase.initializeApp(config);
                
                const db = firebase.database();
                const snap = await db.ref().once('value');
                const freshData = snap.val();
                
                localStorage.setItem(CACHE_KEY, JSON.stringify(freshData));
                globalData = freshData;
                processData(freshData);
            } catch(e) { console.warn("Using offline mode/cache", e); }
        }

        function processData(data) {
            membersData = data.members || {};
            const txObj = data.transactions || {};
            
            allTransactions = Object.values(txObj).map(t => ({
                ...t,
                dateObj: parseDate(t.date || t.timestamp)
            }));
            renderUI();
        }

        // 2. MAIN RENDERER
        function renderUI() {
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const currentMonthName = monthNames[currentDate.getMonth()];
            const currentYear = currentDate.getFullYear();

            document.getElementById('currentMonthDisplay').textContent = `${currentMonthName} ${currentYear}`;

            let monthTx = allTransactions.filter(t => 
                t.dateObj.getMonth() === currentDate.getMonth() && 
                t.dateObj.getFullYear() === currentDate.getFullYear()
            );

            currentMonthTransactions = [...monthTx];

            const stats = calculateStats(monthTx);
            animateValue('val-sip', stats.sip);
            animateValue('val-loan', stats.loan);
            animateValue('val-repay', stats.repay);

            let displayTx = [...monthTx];
            const filterEl = document.getElementById('filterStatus');

            if (activeFilter) {
                if (activeFilter === 'SIP') displayTx = displayTx.filter(t => t.type === 'SIP' || t.type === 'Extra Payment');
                else if (activeFilter === 'LOAN') displayTx = displayTx.filter(t => t.type === 'Loan Taken' || t.type.includes('Withdraw'));
                else if (activeFilter === 'REPAY') displayTx = displayTx.filter(t => t.type === 'Loan Payment');
                
                displayTx.sort((a, b) => getTxAmount(b) - getTxAmount(a));
                filterEl.textContent = `Showing Highest ${activeFilter}`;
            } else {
                displayTx.sort((a, b) => b.dateObj - a.dateObj);
                filterEl.textContent = "";
            }

            document.getElementById('txCountBadge').textContent = `${displayTx.length} Transactions`;
            renderList(displayTx);
        }

        function calculateStats(txList) {
            let sip = 0, loan = 0, repay = 0;
            txList.forEach(t => {
                const amt = parseFloat(t.amount || 0);
                const pPaid = parseFloat(t.principalPaid || 0);
                const iPaid = parseFloat(t.interestPaid || 0);
                
                if (t.type === 'SIP' || t.type === 'Extra Payment') sip += amt;
                else if (t.type === 'Loan Taken' || t.type.includes('Withdraw')) loan += amt;
                else if (t.type === 'Loan Payment') repay += (pPaid + iPaid > 0) ? (pPaid + iPaid) : amt;
            });
            return { sip, loan, repay };
        }

        // 🌟 NEW FUNCTION: CALCULATE GLOBAL FUND HEALTH (For PDF Footer)
        function calculateGlobalSnapshot() {
            // 1. Available Balance (From Admin Stats if available, else calc)
            let available = 0;
            if (globalData.admin && globalData.admin.balanceStats) {
                available = parseFloat(globalData.admin.balanceStats.availableBalance || 0);
            }

            // 2. Total SIP (Cumulative)
            let totalSip = 0;
            if (globalData.admin && globalData.admin.balanceStats) {
                totalSip = parseFloat(globalData.admin.balanceStats.totalSIP || 0);
            } else {
                 // Fallback calculation
                 allTransactions.forEach(t => {
                    if(t.type === 'SIP' || t.type === 'Extra Payment') totalSip += parseFloat(t.amount || 0);
                 });
            }

            // 3. Active Loans (Outstanding)
            let totalActiveLoans = 0;
            if (globalData.activeLoans) {
                Object.values(globalData.activeLoans).forEach(l => {
                    if(l.status === 'Active') totalActiveLoans += parseFloat(l.outstandingAmount || l.amount || 0);
                });
            }

            return { available, totalSip, totalActiveLoans };
        }

        function renderList(list) {
            const container = document.getElementById('transactionList');
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = `<div class="empty-state">No transactions found.</div>`;
                return;
            }

            list.forEach(t => {
                const memberName = membersData[t.memberId]?.fullName || membersData[t.memberId]?.name || 'Unknown';
                const day = t.dateObj.getDate();
                const monthShort = t.dateObj.toLocaleString('default', { month: 'short' });
                
                let typeHtml = '', amountClass = '', amountSign = '+';
                let displayAmt = getTxAmount(t);

                if (t.type === 'SIP' || t.type === 'Extra Payment') {
                    typeHtml = `<span class="tx-type color-green"><i data-feather="arrow-down-left" style="width:12px;"></i> SIP</span>`;
                    amountClass = 'color-green';
                } else if (t.type === 'Loan Taken' || t.type.includes('Withdraw')) {
                    typeHtml = `<span class="tx-type color-red"><i data-feather="arrow-up-right" style="width:12px;"></i> LOAN</span>`;
                    amountClass = 'color-red';
                    amountSign = '-';
                } else if (t.type === 'Loan Payment') {
                    typeHtml = `<span class="tx-type color-blue"><i data-feather="check-circle" style="width:12px;"></i> REPAY</span>`;
                    amountClass = 'color-blue';
                }

                container.innerHTML += `
                    <div class="tx-card">
                        <div class="tx-date-box">
                            <span class="tx-month">${monthShort}</span>
                            <span class="tx-day">${day}</span>
                        </div>
                        <div class="tx-info">
                            <h4 class="tx-name">${memberName}</h4>
                            ${typeHtml}
                        </div>
                        <div class="tx-amount ${amountClass}">
                            ${amountSign}₹${displayAmt.toLocaleString('en-IN')}
                        </div>
                    </div>
                `;
            });
            feather.replace();
        }

        // 3. PDF GENERATION (UPDATED WITH FOOTER SNAPSHOT)
        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const monthText = document.getElementById('currentMonthDisplay').textContent;
            const stats = calculateStats(currentMonthTransactions);
            const globalSnapshot = calculateGlobalSnapshot(); // 🟢 NEW: Get Global Stats

            const primaryColor = [0, 21, 64]; 
            const goldColor = [212, 175, 55]; 
            
            // 1. Header
            try { doc.addImage(LOGO_URL, 'JPEG', 90, 10, 30, 30); } catch(e) {}

            doc.setFont("helvetica", "bold");
            doc.setFontSize(18);
            doc.setTextColor(...primaryColor);
            doc.text("TRUST COMMUNITY FUND", 105, 50, null, null, "center");
            
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(100);
            doc.text(`Transaction Statement: ${monthText}`, 105, 58, null, null, "center");

            // 2. Summary Box (Current Month)
            doc.setDrawColor(...goldColor);
            doc.setLineWidth(0.5);
            doc.rect(15, 65, 180, 25); 

            doc.setFontSize(10);
            doc.setTextColor(...primaryColor);
            doc.text("Total SIP (In)", 40, 72, null, null, "center");
            doc.text("Total Loan (Out)", 105, 72, null, null, "center");
            doc.text("Total Repayment", 170, 72, null, null, "center");

            doc.setFont("helvetica", "bold");
            doc.setFontSize(12);
            doc.setTextColor(46, 125, 50); 
            doc.text(`Rs. ${stats.sip.toLocaleString()}`, 40, 80, null, null, "center");
            doc.setTextColor(198, 40, 40); 
            doc.text(`Rs. ${stats.loan.toLocaleString()}`, 105, 80, null, null, "center");
            doc.setTextColor(21, 101, 192); 
            doc.text(`Rs. ${stats.repay.toLocaleString()}`, 170, 80, null, null, "center");

            // 3. Transactions Table
            const tableBody = currentMonthTransactions.sort((a,b)=>a.dateObj-b.dateObj).map(t => {
                const date = t.dateObj.toLocaleDateString('en-GB');
                const name = membersData[t.memberId]?.fullName || "Unknown";
                const type = t.type.replace('Extra ', '');
                const amt = getTxAmount(t).toLocaleString('en-IN');
                return [date, name, type, `Rs. ${amt}`];
            });

            doc.autoTable({
                startY: 100,
                head: [['Date', 'Member Name', 'Type', 'Amount']],
                body: tableBody,
                theme: 'grid',
                headStyles: { fillColor: primaryColor, textColor: 255, fontStyle: 'bold' },
                alternateRowStyles: { fillColor: [248, 249, 253] },
                styles: { fontSize: 9, cellPadding: 3 },
                columnStyles: { 3: { halign: 'right', fontStyle: 'bold' } },
            });

            // 4. 🟢 NEW: FUND HEALTH CARD (FOOTER on Last Page)
            const finalY = doc.lastAutoTable.finalY + 10;
            
            // Check if we need a new page for the footer card
            if (finalY > 250) {
                doc.addPage();
                doc.lastAutoTable.finalY = 20; 
            }
            
            const cardY = (finalY > 250) ? 20 : finalY;

            // Card Background (Dark Blue)
            doc.setFillColor(...primaryColor);
            doc.rect(15, cardY, 180, 45, 'F');
            doc.setDrawColor(...goldColor);
            doc.rect(15, cardY, 180, 45); // Border

            // Card Header
            doc.setFontSize(14);
            doc.setTextColor(...goldColor);
            doc.text("CURRENT FUND STATUS", 105, cardY + 12, null, null, "center");
            doc.setFontSize(9);
            doc.setTextColor(200);
            doc.text(`(As of ${new Date().toLocaleDateString('en-GB')})`, 105, cardY + 18, null, null, "center");

            // Card Content (Row 1: SIP & Active Loans)
            doc.setFontSize(10);
            doc.setTextColor(255, 255, 255);
            doc.text("Total SIP Collected:", 30, cardY + 28);
            doc.text(`Rs. ${globalSnapshot.totalSip.toLocaleString('en-IN')}`, 90, cardY + 28, null, null, "right");

            doc.text("Active Loans:", 110, cardY + 28);
            doc.text(`Rs. ${globalSnapshot.totalActiveLoans.toLocaleString('en-IN')}`, 180, cardY + 28, null, null, "right");

            // Card Content (Row 2: Available - Big)
            doc.setDrawColor(255, 255, 255);
            doc.line(30, cardY + 32, 180, cardY + 32); // Divider line

            doc.setFontSize(12);
            doc.setTextColor(...goldColor);
            doc.text("AVAILABLE FUNDS:", 70, cardY + 40);
            
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(255, 255, 255);
            doc.text(`Rs. ${globalSnapshot.available.toLocaleString('en-IN')}`, 160, cardY + 40, null, null, "center");

            // Page Numbers Footer
            const pageCount = doc.internal.getNumberOfPages();
            for(let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                doc.setTextColor(150);
                doc.text(`Generated via TCF App | ${new Date().toLocaleString()}`, 15, 290);
                doc.text(`Page ${i} of ${pageCount}`, 190, 290, null, null, "right");
            }

            doc.save(`TCF_Statement_${monthText}.pdf`);
        }

        // Helpers
        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderUI(); }
        function toggleFilter(type, cardEl) { 
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
            if (activeFilter === type) { activeFilter = null; } 
            else { activeFilter = type; cardEl.classList.add('active'); }
            renderUI();
        }
        function parseDate(input) { if (!input) return new Date(); let d = new Date(input); return !isNaN(d.getTime()) ? d : new Date(); }
        function getTxAmount(t) { return (t.type === 'Loan Payment') ? ((parseFloat(t.principalPaid||0) + parseFloat(t.interestPaid||0)) || parseFloat(t.amount||0)) : parseFloat(t.amount||0); }
        function animateValue(id, end) { document.getElementById(id).textContent = '₹' + end.toLocaleString('en-IN'); }

    </script>
</body>
</html>
