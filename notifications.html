<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#001540">
    <title>Transactions - Trust Community Fund</title>
    
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- PART 1: CSS DESIGN --- */
        :root {
            --primary: #001540;
            --gold: #D4AF37;
            --bg: #f8f9fd;
            --green: #2e7d32;
            --red: #c62828;
            --blue: #1565c0;
            --text-dark: #1a1a1a;
            --text-light: #757575;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 80px; /* Space for Bottom Nav */
            color: var(--text-dark);
        }

        /* HEADER SECTION */
        .header-section {
            background-color: var(--primary);
            color: white;
            padding: 20px 20px 40px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .page-title { font-size: 1.4rem; font-weight: 600; margin: 0; }
        .sub-title { font-size: 0.75rem; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-top: -2px; display: block; }
        
        .settings-icon {
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 12px;
            color: var(--gold);
        }

        /* MONTH NAVIGATOR (Floating) */
        .month-nav-container {
            position: absolute;
            bottom: -22px;
            left: 0; 
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .month-selector {
            background: white;
            padding: 8px 10px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 200px;
            justify-content: space-between;
        }

        .nav-btn {
            background: #f0f2f5;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn:active { transform: scale(0.9); background: var(--gold); color: white; }

        .current-month {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        /* SUMMARY CARDS ROW */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 40px 15px 10px 15px; /* Top padding clears month nav */
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 12px 5px;
            text-align: center;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        /* Active Filter State */
        .stat-card.active {
            border-color: var(--gold);
            background: #fffdf5;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
        }

        .stat-icon-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 1rem;
        }

        .stat-label { font-size: 0.65rem; font-weight: 600; color: #999; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 0.9rem; font-weight: 700; }

        /* Colors for Cards */
        .card-sip .stat-icon-circle { background: #e8f5e9; color: var(--green); }
        .card-sip .stat-value { color: var(--green); }
        
        .card-loan .stat-icon-circle { background: #ffebee; color: var(--red); }
        .card-loan .stat-value { color: var(--red); }

        .card-repay .stat-icon-circle { background: #e3f2fd; color: var(--blue); }
        .card-repay .stat-value { color: var(--blue); }

        /* TRANSACTION LIST */
        .list-header {
            padding: 15px 20px 5px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }
        
        .filter-indicator {
            color: var(--gold);
            font-size: 0.7rem;
            display: none;
        }
        .filter-indicator.show { display: block; }

        .tx-list { padding: 10px 15px; }

        .tx-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s;
        }
        
        .tx-card:active { transform: scale(0.98); }

        /* Date Box (Left) */
        .tx-date-box {
            background: #f5f7fa;
            border-radius: 12px;
            padding: 8px 12px;
            text-align: center;
            min-width: 55px;
            margin-right: 15px;
        }
        .tx-month { font-size: 0.65rem; font-weight: 700; color: var(--red); text-transform: uppercase; display: block; line-height: 1; }
        .tx-day { font-size: 1.2rem; font-weight: 700; color: var(--primary); display: block; line-height: 1.2; }

        /* Info (Middle) */
        .tx-info { flex-grow: 1; }
        .tx-name { font-size: 0.95rem; font-weight: 600; color: var(--primary); margin: 0; }
        .tx-type { font-size: 0.7rem; font-weight: 600; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
        
        /* Amount (Right) */
        .tx-amount { font-size: 1rem; font-weight: 700; text-align: right; }

        /* Colors */
        .color-green { color: var(--green); }
        .color-red { color: var(--red); }
        .color-blue { color: var(--blue); }
        .bg-green-light { background: #e8f5e9; color: var(--green); padding: 2px 6px; border-radius: 4px; }
        .bg-red-light { background: #ffebee; color: var(--red); padding: 2px 6px; border-radius: 4px; }
        .bg-blue-light { background: #e3f2fd; color: var(--blue); padding: 2px 6px; border-radius: 4px; }

        .empty-state { text-align: center; padding: 40px; color: #999; font-size: 0.9rem; }

        /* Bottom Nav CSS (Injected from user-style-components but adding here for safety) */
        .bottom-nav-container {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: white; display: flex; justify-content: space-around;
            align-items: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
        }
        .nav-item { text-align: center; color: #ccc; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { width: 22px; height: 22px; margin-bottom: 2px; }
        .nav-text { font-size: 0.65rem; font-weight: 600; display: block; }
        .nav-center-btn {
            background: var(--primary); width: 50px; height: 50px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--gold); margin-top: -25px; border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,35,102,0.3);
        }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="header-top">
            <div>
                <h1 class="page-title">Transaction History</h1>
                <span class="sub-title">Trust Community Fund</span>
            </div>
            <div class="settings-icon">
                <i data-feather="grid"></i>
            </div>
        </div>
        
        <div class="month-nav-container">
            <div class="month-selector">
                <button class="nav-btn" onclick="changeMonth(-1)"><i data-feather="chevron-left"></i></button>
                <span id="currentMonthDisplay" class="current-month">JANUARY 2026</span>
                <button class="nav-btn" onclick="changeMonth(1)"><i data-feather="chevron-right"></i></button>
            </div>
        </div>
    </header>

    <div class="stats-container">
        <div class="stat-card card-sip" onclick="toggleFilter('SIP', this)">
            <div class="stat-icon-circle"><i data-feather="feather" style="width:18px;"></i></div>
            <div class="stat-label">SIP (IN)</div>
            <div class="stat-value" id="val-sip">₹0</div>
        </div>

        <div class="stat-card card-loan" onclick="toggleFilter('LOAN', this)">
            <div class="stat-icon-circle"><i data-feather="send" style="width:16px; margin-left:2px; margin-top:2px;"></i></div>
            <div class="stat-label">LOAN GIVEN</div>
            <div class="stat-value" id="val-loan">₹0</div>
        </div>

        <div class="stat-card card-repay" onclick="toggleFilter('REPAY', this)">
            <div class="stat-icon-circle"><i data-feather="credit-card" style="width:18px;"></i></div>
            <div class="stat-label">REPAYMENT</div>
            <div class="stat-value" id="val-repay">₹0</div>
        </div>
    </div>

    <div class="list-header">
        <span>Transaction Log</span>
        <span id="filterStatus" class="filter-indicator">Filtered: Top Amounts</span>
    </div>

    <div id="transactionList" class="tx-list">
        <div class="empty-state">Loading transactions...</div>
    </div>

    <nav class="bottom-nav-container">
        <div class="nav-item" onclick="window.location.href='index.html'">
            <i data-feather="home" class="nav-icon"></i>
            <span class="nav-text">Home</span>
        </div>
        
        <div class="nav-item" onclick="window.location.href='loan_dashbord.html'">
            <i data-feather="briefcase" class="nav-icon"></i>
            <span class="nav-text">Loan</span>
        </div>

        <div class="nav-item" onclick="window.location.href='loan_form.html'">
            <div class="nav-center-btn">
                <i data-feather="file-text" style="width: 20px; height: 20px;"></i>
                <span style="font-size: 8px; font-weight: bold;">APPLY</span>
            </div>
        </div>
        
        <div class="nav-item active" onclick="window.location.href='notifications.html'">
            <i data-feather="clock" class="nav-icon"></i>
            <span class="nav-text">History</span>
        </div>

        <div class="nav-item" onclick="window.location.href='index.html?tab=tab-profile'">
            <i data-feather="user" class="nav-icon"></i>
            <span class="nav-text">Profile</span>
        </div>
    </nav>

    <script>
        const CACHE_KEY = 'tcf_royal_cache_v6';
        let allTransactions = [];
        let membersData = {};
        
        // State
        let currentDate = new Date(); // Defaults to today
        let activeFilter = null; // 'SIP', 'LOAN', 'REPAY', or null

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            feather.replace();
        });

        // 1. Firebase & Data Loading
        async function initFirebase() {
            // Check Cache First
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                const data = JSON.parse(cached);
                processData(data);
            }

            // Fetch Fresh Data
            try {
                const res = await fetch('/api/firebase-config');
                const config = await res.json();
                if (!firebase.apps.length) firebase.initializeApp(config);
                
                const db = firebase.database();
                const snap = await db.ref().once('value');
                const freshData = snap.val();
                
                // Update Cache & UI
                localStorage.setItem(CACHE_KEY, JSON.stringify(freshData));
                processData(freshData);

            } catch(e) { console.warn("Network Error, using cache", e); }
        }

        function processData(data) {
            membersData = data.members || {};
            const txObj = data.transactions || {};
            
            // Convert to Array & Normalize Date
            allTransactions = Object.values(txObj).map(t => ({
                ...t,
                dateObj: parseDate(t.date || t.timestamp)
            }));

            renderUI();
        }

        // 2. Main Render Logic
        function renderUI() {
            // A. Update Month Display
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('currentMonthDisplay').textContent = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

            // B. Filter by Month
            const monthTx = allTransactions.filter(t => 
                t.dateObj.getMonth() === currentDate.getMonth() && 
                t.dateObj.getFullYear() === currentDate.getFullYear()
            );

            // C. Calculate Totals (Dynamic)
            calculateStats(monthTx);

            // D. Apply Smart Filtering (Filter Type + Sort by Amount)
            let displayTx = [...monthTx];
            
            if (activeFilter) {
                // Filter Mode: Show specific type & Sort by AMOUNT High-to-Low
                if (activeFilter === 'SIP') {
                    displayTx = displayTx.filter(t => t.type === 'SIP' || t.type === 'Extra Payment');
                } else if (activeFilter === 'LOAN') {
                    displayTx = displayTx.filter(t => t.type === 'Loan Taken' || t.type.includes('Withdraw'));
                } else if (activeFilter === 'REPAY') {
                    displayTx = displayTx.filter(t => t.type === 'Loan Payment');
                }
                
                // 🔥 Sorting Highest Amount First
                displayTx.sort((a, b) => {
                    const amtA = getTxAmount(a);
                    const amtB = getTxAmount(b);
                    return amtB - amtA;
                });

                document.getElementById('filterStatus').textContent = `Filtered: Highest ${activeFilter}`;
                document.getElementById('filterStatus').classList.add('show');

            } else {
                // Default Mode: Sort by DATE Newest First
                displayTx.sort((a, b) => b.dateObj - a.dateObj);
                document.getElementById('filterStatus').classList.remove('show');
            }

            // E. Render List
            renderList(displayTx);
        }

        // 3. Stats Calculation
        function calculateStats(txList) {
            let sip = 0, loan = 0, repay = 0;

            txList.forEach(t => {
                const amt = parseFloat(t.amount || 0);
                const pPaid = parseFloat(t.principalPaid || 0);
                const iPaid = parseFloat(t.interestPaid || 0);
                
                if (t.type === 'SIP' || t.type === 'Extra Payment') sip += amt;
                else if (t.type === 'Loan Taken' || t.type.includes('Withdraw')) loan += amt;
                else if (t.type === 'Loan Payment') repay += (pPaid + iPaid > 0) ? (pPaid + iPaid) : amt;
            });

            animateValue('val-sip', sip);
            animateValue('val-loan', loan);
            animateValue('val-repay', repay);
        }

        // 4. Interaction Functions
        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            // Reset filter when month changes (optional, but good UX)
            // activeFilter = null; 
            // clearActiveCards();
            renderUI();
        }

        function toggleFilter(type, cardEl) {
            // Remove active class from all
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));

            if (activeFilter === type) {
                // Deactivate if clicked again
                activeFilter = null;
            } else {
                // Activate new filter
                activeFilter = type;
                cardEl.classList.add('active');
            }
            renderUI();
        }

        function clearActiveCards() {
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
        }

        // 5. List Rendering
        function renderList(list) {
            const container = document.getElementById('transactionList');
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = `<div class="empty-state">No transactions found for this period.</div>`;
                return;
            }

            list.forEach(t => {
                const memberName = membersData[t.memberId]?.fullName || membersData[t.memberId]?.name || 'Unknown Member';
                const day = t.dateObj.getDate();
                const monthShort = t.dateObj.toLocaleString('default', { month: 'short' });
                
                let typeHtml = '';
                let amountClass = '';
                let amountSign = '';
                let displayAmt = getTxAmount(t);

                // Styling logic based on Type
                if (t.type === 'SIP' || t.type === 'Extra Payment') {
                    typeHtml = `<span class="tx-type color-green"><i data-feather="arrow-down-left" style="width:12px;"></i> SIP DEPOSIT</span>`;
                    amountClass = 'color-green';
                    amountSign = '+';
                } 
                else if (t.type === 'Loan Taken' || t.type.includes('Withdraw')) {
                    typeHtml = `<span class="tx-type color-red"><i data-feather="arrow-up-right" style="width:12px;"></i> LOAN TAKEN</span>`;
                    amountClass = 'color-red';
                    amountSign = '-';
                } 
                else if (t.type === 'Loan Payment') {
                    typeHtml = `<span class="tx-type color-blue"><i data-feather="check-circle" style="width:12px;"></i> LOAN REPAYMENT</span>`;
                    amountClass = 'color-blue';
                    amountSign = '+';
                }

                const html = `
                    <div class="tx-card">
                        <div class="tx-date-box">
                            <span class="tx-month">${monthShort}</span>
                            <span class="tx-day">${day}</span>
                        </div>
                        <div class="tx-info">
                            <h4 class="tx-name">${memberName}</h4>
                            ${typeHtml}
                        </div>
                        <div class="tx-amount ${amountClass}">
                            ${amountSign}₹${formatMoney(displayAmt)}
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
            feather.replace();
        }

        // Helpers
        function parseDate(input) {
            if (!input) return new Date();
            let d = new Date(input);
            if (!isNaN(d.getTime())) return d;
            return new Date(); // Fallback
        }

        function getTxAmount(t) {
            if (t.type === 'Loan Payment') {
                return (parseFloat(t.principalPaid||0) + parseFloat(t.interestPaid||0)) || parseFloat(t.amount||0);
            }
            return parseFloat(t.amount||0);
        }

        function formatMoney(amount) {
            return amount.toLocaleString('en-IN');
        }

        function animateValue(id, end) {
            const el = document.getElementById(id);
            el.textContent = '₹' + formatMoney(end);
        }

    </script>
</body>
</html>
